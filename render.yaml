services:
  - type: web
    name: truckx-auto-dialer
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: LEAD_SOURCE
        value: hubspot
      - key: APP_USERNAME
        value: admin
      - key: VOICE_PROVIDER
        value: mock
      - key: DEFAULT_CALL_WINDOW_START
        value: "09:00"
      - key: DEFAULT_CALL_WINDOW_END
        value: "18:00"
      - key: MAX_ATTEMPTS_PER_LEAD
        value: "3"
